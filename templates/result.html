<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Risultati Bulk Upload</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body { background-color: #ECE5DD; }</style>
</head>
<body class="py-8 flex justify-center">
  <div class="bg-white shadow-lg rounded-lg p-6 w-full max-w-4xl">
    <h1 class="text-3xl font-medium text-gray-800 mb-6 text-center">Risultati Caricamento Massivo</h1>
    <div class="overflow-x-auto">
      <table class="min-w-full text-left divide-y divide-gray-200">
        <thead class="bg-gray-100">
          <tr>
            <th class="px-4 py-2">P.IVA</th>
            <th class="px-4 py-2">Ragione Sociale</th>
            <th class="px-4 py-2">PEC</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-100">
          {% for r in results %}
          <tr class="hover:bg-gray-50">
            <td class="px-4 py-2">{{ r.vat }}</td>
            <td class="px-4 py-2">{{ r.ragione }}</td>
            <td class="px-4 py-2">{{ r.pec }}</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
    <div class="mt-6 flex justify-center space-x-4">
      <a href="{{ csv_uri }}" download="pec_results.csv" class="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600 transition">⬇️ Scarica CSV</a>
      <a href="/" class="text-green-600 hover:underline">← Torna indietro</a>
    </div>
  </div>
</body>
</html>
