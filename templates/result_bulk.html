<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Risultati Bulk Upload</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2em; }
    table { border-collapse: collapse; width: 100%; margin-bottom: 1em; }
    th, td { border: 1px solid #ccc; padding: 0.5em; text-align: left; }
    th { background-color: #f4f4f4; }
    a.button { display: inline-block; margin-top: 1em; padding: 0.5em 1em; background: #007bff; color: white; text-decoration: none; border-radius: 4px; }
    a.button:hover { background: #0056b3; }
  </style>
</head>
<body>
  <h1>Risultati caricamento massivo</h1>
  <table>
    <tr>
      <th>P.IVA</th>
      <th>Ragione Sociale</th>
      <th>PEC</th>
    </tr>
    {% for r in results %}
    <tr>
      <td>{{ r.vat }}</td>
      <td>{{ r.ragione }}</td>
      <td>{{ r.pec }}</td>
    </tr>
    {% endfor %}
  </table>
  <a class="button" href="{{ csv_uri }}" download="pec_results.csv">
    ⬇️ Scarica CSV dei risultati
  </a>
  <p><a href="/">← Torna indietro</a></p>
</body>
</html>
